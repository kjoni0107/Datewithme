<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Will You Be My Date?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --glass-bg: rgba(25, 15, 35, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text-main: #fff;
            --text-accent: #ff7eb3;
            --btn-yes: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --btn-no: linear-gradient(135deg, #ff0844 0%, #ffb199 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #050510;
            color: var(--text-main);
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        /* Ambient Aurora/Galaxy Background */
        .aurora-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 20% 30%, rgba(76, 29, 149, 0.4) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(157, 23, 77, 0.4) 0%, transparent 50%);
            filter: blur(60px);
            z-index: 0;
            animation: auroraPulse 10s infinite alternate ease-in-out;
        }

        @keyframes auroraPulse {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; pointer-events: none; }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 3rem 2rem;
            width: 90%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255,255,255,0.05);
            position: relative;
            z-index: 10;
            transition: transform 0.1s ease-out, opacity 0.5s ease;
            transform-style: preserve-3d;
        }

        .scene { display: none; opacity: 0; transition: opacity 0.8s ease; }
        .scene.active { display: block; opacity: 1; }

        /* Scene 1: Intro */
        #scene-intro { cursor: pointer; }
        .intro-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 600;
            color: var(--text-accent);
            text-shadow: 0 0 20px rgba(255, 126, 179, 0.6);
            animation: floatGlow 3s infinite ease-in-out;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translateY(0) scale(1); text-shadow: 0 0 15px rgba(255, 126, 179, 0.4); }
            50% { transform: translateY(-10px) scale(1.02); text-shadow: 0 0 30px rgba(255, 126, 179, 0.8); }
        }

        /* Scene 2: Dialogue */
        .typewriter-container {
            min-height: 120px;
            font-size: 1.4rem;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 2rem;
        }
        
        .cursor { display: inline-block; width: 3px; height: 1.2em; background: #fff; vertical-align: bottom; animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .buttons-container {
            display: flex; justify-content: center; align-items: center; gap: 1.5rem; min-height: 70px; position: relative;
        }

        button {
            border: none; padding: 1rem 2rem; border-radius: 50px; font-family: 'Poppins', sans-serif;
            font-weight: 600; font-size: 1.1rem; color: #fff; cursor: pointer;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3); transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden;
        }

        button::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); transition: 0.5s;
        }
        button:hover::after { left: 150%; }
        button:active { transform: scale(0.9); }

        #btn-yes { background: var(--btn-yes); z-index: 2; box-shadow: 0 0 20px rgba(79, 172, 254, 0.5); }
        #btn-no { background: var(--btn-no); z-index: 3; position: relative; }

        /* Scene 3: Celebration */
        #scene-celebration h1 {
            font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--text-accent);
            text-shadow: 0 0 30px rgba(255, 126, 179, 0.8); margin-bottom: 1rem;
        }
        #scene-celebration p { font-size: 1.2rem; margin-bottom: 1.5rem; font-weight: 300; }
        .heart-beat { font-size: 4rem; display: inline-block; animation: heartBeat 1s infinite; filter: drop-shadow(0 0 20px rgba(255,0,0,0.6)); }

        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 15% { transform: scale(1.3); } 30% { transform: scale(1); } 45% { transform: scale(1.3); } }

        /* UI Controls */
        #mute-btn {
            position: fixed; bottom: 20px; right: 20px; background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 40px; height: 40px;
            color: #fff; font-size: 1.2rem; cursor: pointer; z-index: 100; backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center; padding: 0; box-shadow: none;
        }
        #secret-corner { position: fixed; top: 0; left: 0; width: 50px; height: 50px; z-index: 100; cursor: crosshair; }
    </style>
</head>
<body>

    <div class="aurora-bg"></div>
    <canvas id="main-canvas"></canvas>

    <div id="secret-corner" onclick="triggerSecret()"></div>
    <button id="mute-btn" onclick="toggleMute()">🎵</button>

    <div class="glass-card" id="card">
        <div id="scene-intro" class="scene active" onclick="startExperience()">
            <div class="intro-text">👋 Hi! Gab Touch Me ❤️</div>
        </div>

        <div id="scene-dialogue" class="scene">
            <div class="typewriter-container"><span id="type-text"></span><span class="cursor"></span></div>
            <div class="buttons-container" id="btn-container" style="display: none; opacity: 0;">
                <button id="btn-yes" onclick="handleYes()">💚 Yes</button>
                <button id="btn-no" onclick="handleNo(event)">❤️ No</button>
            </div>
        </div>

        <div id="scene-celebration" class="scene">
            <h1>❤️ YAY!! ❤️</h1>
            <p>You just made me the happiest person today.</p>
            <p>I can't wait for our date! ✨</p>
            <div class="heart-beat">❤️</div>
        </div>
    </div>

    <script>
        /**
         * Core State & Data
         */
        const dialogue = [
            "Hi Roms 😊",
            "I've been wanting to tell you something...",
            "Every time I see you, you make my day a little brighter.",
            "I've been wondering...",
            "Can I ask you something?",
            "Will you be my date? ❤️"
        ];

        const noMessages = [
            "Are you sure? 🥺", "Please? ❤️", "I'll buy you coffee ☕", 
            "I'll bring snacks 🍕", "You clicked the wrong one 😆", 
            "Nice try 😂", "The Yes button misses you.", "Give it another chance ❤️"
        ];

        let state = {
            noClicks: 0,
            yesScale: 1,
            audioContext: null,
            isMuted: false,
            bgmOscillators: [],
            particles: [],
            stars: [],
            scene: 1,
            tapCount: 0,
            tapTimeout: null
        };

        /**
         * Canvas Engine (Particles, Stars, Fireworks)
         */
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initStars();
        }
        window.addEventListener('resize', resize);
        
        class Star {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.z = Math.random() * 2;
                this.size = Math.random() * 1.5 + 0.5;
                this.alpha = Math.random();
                this.fade = Math.random() * 0.02 + 0.005;
            }
            update() {
                this.alpha += this.fade;
                if(this.alpha > 1 || this.alpha < 0) this.fade *= -1;
                this.y -= this.z * 0.2;
                if(this.y < 0) this.reset();
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, type) {
                this.x = x; this.y = y; this.type = type;
                this.vx = (Math.random() - 0.5) * (type === 'firework' ? 15 : 5);
                this.vy = (Math.random() - 0.5) * (type === 'firework' ? 15 : 5) - (type === 'heart' ? 2 : 0);
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
                this.color = `hsl(${Math.random() * 60 + 330}, 100%, 60%)`; // Pink/Red hues
                this.size = Math.random() * 5 + 2;
                if(type === 'confetti') {
                    this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    this.size = Math.random() * 10 + 5;
                    this.vx = (Math.random() - 0.5) * 10;
                    this.vy = Math.random() * -15 - 5;
                    this.gravity = 0.5;
                    this.spin = Math.random() * 360;
                    this.spinSpeed = Math.random() * 10 - 5;
                }
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if(this.type === 'confetti') {
                    this.vy += this.gravity;
                    this.spin += this.spinSpeed;
                }
                this.life -= this.decay;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.globalAlpha = this.life;
                if(this.type === 'confetti') {
                    ctx.rotate(this.spin * Math.PI / 180);
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size/2);
                } else if (this.type === 'heart' || this.type === 'trail') {
                    ctx.fillStyle = this.color;
                    ctx.font = `${this.size * 3}px Arial`;
                    ctx.fillText('❤', -this.size, 0);
                } else {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        function initStars() {
            state.stars = [];
            for(let i=0; i<100; i++) state.stars.push(new Star());
        }

        function spawnParticles(x, y, count, type) {
            for(let i=0; i<count; i++) state.particles.push(new Particle(x, y, type));
        }

        function animateLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            state.stars.forEach(s => { s.update(); s.draw(); });
            
            for(let i = state.particles.length - 1; i >= 0; i--) {
                let p = state.particles[i];
                p.update();
                p.draw();
                if(p.life <= 0 || p.y > canvas.height + 50) state.particles.splice(i, 1);
            }
            requestAnimationFrame(animateLoop);
        }
        
        resize();
        animateLoop();

        /**
         * Procedural Audio Engine
         */
        function initAudio() {
            if(state.audioContext) return;
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            state.audioContext = new AudioContext();
            startAmbientBGM();
        }

        function playTone(freq, type, duration, vol=0.1) {
            if(!state.audioContext || state.isMuted) return;
            const osc = state.audioContext.createOscillator();
            const gain = state.audioContext.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, state.audioContext.currentTime);
            
            gain.gain.setValueAtTime(vol, state.audioContext.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, state.audioContext.currentTime + duration);
            
            osc.connect(gain); gain.connect(state.audioContext.destination);
            osc.start(); osc.stop(state.audioContext.currentTime + duration);
        }

        function playPop() { playTone(800, 'sine', 0.1, 0.2); setTimeout(()=>playTone(1200,'sine',0.1,0.2), 50); }
        function playSwoosh() { playTone(300, 'triangle', 0.3, 0.1); }
        function playSuccess() { 
            [440, 554.37, 659.25, 880].forEach((f, i) => {
                setTimeout(() => playTone(f, 'sine', 0.5, 0.2), i * 150);
            });
        }

        function startAmbientBGM() {
            if(!state.audioContext) return;
            const notes = [261.63, 329.63, 392.00, 523.25]; // C E G C
            let noteIdx = 0;
            setInterval(() => {
                if(state.isMuted || state.scene !== 2) return;
                playTone(notes[noteIdx], 'sine', 2, 0.03);
                noteIdx = (noteIdx + 1) % notes.length;
            }, 2000);
        }

        function toggleMute() {
            state.isMuted = !state.isMuted;
            document.getElementById('mute-btn').innerText = state.isMuted ? '🔇' : '🎵';
        }

        /**
         * UI & Interactions
         */
        const card = document.getElementById('card');
        
        // 3D Tilt Effect
        document.addEventListener('mousemove', (e) => {
            if(state.scene !== 1 && state.scene !== 2) return;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            
            // Cursor trails
            if(Math.random() > 0.8) spawnParticles(e.pageX, e.pageY, 1, 'trail');
        });

        // Mobile touch ripple
        document.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            spawnParticles(touch.pageX, touch.pageY, 5, 'trail');
        });

        const sleep = ms => new Promise(r => setTimeout(r, ms));

        async function startExperience() {
            initAudio();
            playSwoosh();
            if(navigator.vibrate) navigator.vibrate(50);
            
            // Transition
            const rect = card.getBoundingClientRect();
            spawnParticles(rect.left + rect.width/2, rect.top + rect.height/2, 30, 'heart');
            
            card.style.transform = 'scale(1.1) rotateY(180deg)';
            card.style.opacity = '0';
            
            await sleep(400);
            document.getElementById('scene-intro').classList.remove('active');
            document.getElementById('scene-dialogue').classList.add('active');
            card.style.transform = 'scale(1) rotateY(0deg)';
            card.style.opacity = '1';
            state.scene = 2;

            await runTypewriter();
        }

        async function runTypewriter() {
            const textEl = document.getElementById('type-text');
            for (let i = 0; i < dialogue.length; i++) {
                textEl.innerText = '';
                const line = dialogue[i];
                for (let j = 0; j < line.length; j++) {
                    textEl.innerText += line[j];
                    if(line[j] !== ' ' && Math.random()>0.3) playTone(400 + Math.random()*200, 'sine', 0.05, 0.02);
                    await sleep(40 + Math.random() * 30);
                }
                await sleep(1500);
            }
            
            const btnCont = document.getElementById('btn-container');
            btnCont.style.display = 'flex';
            setTimeout(() => { btnCont.style.opacity = '1'; }, 100);
        }

        function handleNo(e) {
            playPop();
            if(navigator.vibrate) navigator.vibrate(20);
            
            state.noClicks++;
            const btnNo = document.getElementById('btn-no');
            const btnYes = document.getElementById('btn-yes');

            // Logic: Evade, shrink, change text
            btnNo.innerText = noMessages[state.noClicks % noMessages.length];
            
            state.yesScale += 0.2;
            btnYes.style.transform = `scale(${state.yesScale})`;
            btnYes.style.boxShadow = `0 0 ${state.yesScale * 20}px rgba(79, 172, 254, 0.8)`;

            if(state.noClicks > 2) {
                btnNo.style.position = 'absolute';
                const containerRect = document.getElementById('scene-dialogue').getBoundingClientRect();
                
                // Advanced Evasion
                let rx, ry;
                if (state.noClicks % 3 === 0) {
                    // Teleport far
                    rx = Math.random() * 200 - 100;
                    ry = Math.random() * 200 - 100;
                } else {
                    // Dodge cursor
                    const mx = e ? e.clientX : containerRect.width/2;
                    rx = mx > containerRect.width/2 ? -50 - Math.random()*50 : 50 + Math.random()*50;
                    ry = (Math.random() - 0.5) * 100;
                }
                
                btnNo.style.transform = `translate(${rx}px, ${ry}px) scale(${Math.max(0.3, 1 - state.noClicks*0.05)}) rotate(${Math.random()*20-10}deg)`;
            }

            if(state.noClicks >= 10) {
                btnYes.style.position = 'fixed';
                btnYes.style.top = '0'; btnYes.style.left = '0';
                btnYes.style.width = '100vw'; btnYes.style.height = '100vh';
                btnYes.style.zIndex = '999';
                btnYes.style.borderRadius = '0';
                btnYes.innerText = "JUST SAY YES ❤️";
                btnYes.style.fontSize = '3rem';
            }
        }

        function handleYes() {
            playSuccess();
            state.scene = 3;
            if(navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 300]);

            // Visual transition
            document.body.style.background = 'radial-gradient(circle at center, #ff9a9e 0%, #fecfef 99%, #fecfef 100%)';
            document.querySelector('.aurora-bg').style.display = 'none';

            card.style.opacity = '0';
            setTimeout(() => {
                document.getElementById('scene-dialogue').classList.remove('active');
                document.getElementById('scene-celebration').classList.add('active');
                card.style.opacity = '1';
                card.style.transform = 'scale(1)';
                card.style.background = 'rgba(255, 255, 255, 0.4)';
            }, 500);

            // Celebration loop
            spawnParticles(canvas.width/2, canvas.height, 100, 'confetti');
            let fireworkInterval = setInterval(() => {
                spawnParticles(Math.random()*canvas.width, Math.random()*canvas.height/2, 40, 'firework');
                playTone(200 + Math.random()*400, 'sine', 0.2, 0.05);
            }, 800);
            
            setTimeout(() => clearInterval(fireworkInterval), 5000);
        }

        /**
         * Easter Eggs
         */
        // Multi-tap detection
        document.addEventListener('click', (e) => {
            if(e.target.tagName === 'BUTTON') return;
            state.tapCount++;
            clearTimeout(state.tapTimeout);
            
            if(state.tapCount === 2) {
                spawnParticles(e.pageX, e.pageY, 20, 'heart');
                playTone(600, 'triangle', 0.1, 0.1);
            } else if (state.tapCount === 3) {
                spawnParticles(e.pageX, e.pageY, 50, 'confetti');
                playTone(800, 'triangle', 0.2, 0.1);
                state.tapCount = 0;
            }
            
            state.tapTimeout = setTimeout(() => { state.tapCount = 0; }, 400);
        });

        // Device Shake
        if (window.DeviceMotionEvent) {
            let lastX, lastY, lastZ;
            window.addEventListener('devicemotion', (e) => {
                const acc = e.accelerationIncludingGravity;
                if(!acc.x) return;
                const delta = Math.abs(acc.x - lastX) + Math.abs(acc.y - lastY) + Math.abs(acc.z - lastZ);
                if(delta > 30) spawnParticles(canvas.width/2, 0, 10, 'heart'); // Rain hearts
                lastX = acc.x; lastY = acc.y; lastZ = acc.z;
            });
        }

        function triggerSecret() {
            playPop();
            alert("You found a secret! I really like you btw 😉");
            spawnParticles(25, 25, 30, 'firework');
        }

    </script>
</body>
</html>
